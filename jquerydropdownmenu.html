<!DOCTYPE html>
<html lang="en">
  <head>
    <title>HTML 5 Boilerplate</title>
    <style></style>
  </head>
  <style
  >
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }
    ul.child{
        display: none;
    }

    li{
        list-style: none;
        display: block;
    }

    .parent > li{
        float: left;
        width: 33%;
        text-align: center;
        color: white;
        background-color: #555;
        padding: 10px;
        border-right: 1px solid white;
        
    }

</style>
  <body>
    <div id="nav">
        <ul class="parent">
            <li>Item 1</li>
            <li>Item 2
                <ul class="child">
                    <li>Item 2.1</li>
                    <li>Item 2.2</li>
                    <li>Item 2.3</li>
                    <li>Item 2.4</li>
                </ul>
            </li>
            <li>Item 3</li>
        </ul>
    </div>
	<script src="./javascript/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready( 
            function() {
            $(".parent > li").hover(
                function(){
                    $(this).find('ul.child').show(500);
                }, 
                function(){
                    $(this).find('ul.child').hide(500);
                })
            })
    </script>
  </body>
</html>
